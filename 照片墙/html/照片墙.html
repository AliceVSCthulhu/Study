<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            background-color: #222121;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: flat;
        }

        .box{
            width: 213.33px;
            height: 165px;
            position: relative;
            transition: all 0.5s;
            -webkit-box-reflect: below 1px linear-gradient(transparent,#000200);
        }

        .container .box img{
            width: 100%;
            height: 100%;
            float: left;
            margin: 0 5px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .box img:hover{
            transform: scale(1.5);
            transition: all 0.5s;
            cursor: pointer;
            z-index: 999;
        }

        .container:hover>:not(:hover){
            margin: 0 -20px;
            transition: all 0.5s;
            filter: drop-shadow(0 0 25px #000)
                    drop-shadow(0 0 45px #000);
            transform: perspective(500px) rotateY(45deg) scale(0.8);
            z-index: 0;
            filter: blur(5px);
        }

        .container .box:hover ~ .box{
            transform: perspective(500px) rotateY(-45deg) scale(0.8)
        }
            
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="../img/DM_20240701073555_001.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_002.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_003.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_004.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_005.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_006.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_007.jpg" alt="">
        </div>
        <div class="box">
            <img src="../img/DM_20240701073555_008.jpg" alt="">
        </div>
    </div>
</body>
</html>
