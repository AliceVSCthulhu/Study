<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>像素鸟</title>
    <style>
      .game {
        width: 800px;
        height: 600px;
        outline: 1px solid #000;
        margin: 15% auto;
        position: relative;
        overflow: hidden;
      }
      .game .sky {
        width: 200%;
        height: 100%;
        background: url(./img/sky.png);
        margin-left: 0;
        z-index: 1;
      }
      .game .land {
        width: 200%;
        height: 112px;
        background: url(./img/land.png);
        position: absolute;
        left: 0;
        bottom: 0;
        margin-left: 0;
        z-index: 2;
      }
      .game .bird {
        width: 52px;
        height: 45px;
        background: url(./img/bird.png);
        background-position-x: 0;
        position: absolute;
        top: 150px;
        left: 150px;
        /* outline: 1px solid; */
        z-index: 4;
      }

      body p {
        font-size: 2em;
        margin: 0;
        text-align: center;
        margin-top: -150px;
      }

      .pipe {
        position: absolute;
        width: 52px;
        z-index: 3;
      }

      .up {
        background: url("./img/pipeUp.png") no-repeat;
        /* background-position: left bottom; */
      }
      .down {
        background: url("./img/pipeDown.png") no-repeat;
        background-position: left bottom;
      }

      .score {
        position: fixed;
        top: 200px;
        left: 100px;
      }

      .over {
        position: absolute;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;

        background: rgba(0, 0, 0, 0.5);
        z-index: 5;
        /* line-height: 300px; */
        font-size: 1.5em;
        color: #fff;
        display: none;
      }
      .over div {
        position: absolute;
        width: 440px;
        height: 240px;
        top: 50%;
        left: 50%;
        margin-top: -120px;
        margin-left: -220px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .over div p {
        margin-top: 0;
      }

      /* .over p:first-child {
        margin-top: -100px;
        margin-left: -90px;
      }
      .over p:last-child {
        margin-top: 10px;
        margin-left: -90px;
      } */
    </style>
  </head>

  <body>
    <p class="score">当前分数为:<span></span></p>
    <div class="game">
      <div class="sky"></div>
      <div class="land"></div>
      <div class="bird"></div>
      <div class="over">
        <div>
          <p>游戏结束</p>
          <p>您的得分：<span id="final"></span>分</p>
        </div>
      </div>
    </div>

    <p>回车键重新开始，空格键跳跃, ESC键开始/暂停</p>

    <script src="./5.js"></script>
  </body>
</html>
<!-- z-index 
背景为1，
大地为2，
管道为3，
小鸟为4，
结束朦层为5
-->
