<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../script/测试.js"></script>
</head>
<body>
    <!-- HTML中引入JS的方式
        1、内部方式
            <script>JS代码</script>
            可以写在页面任何位置，推荐写在body结束标签之前
            一个页面可以有多个script标签

        2、外部方式
            新建.js文件
            <script scr=""></script>
            可以写在页面任何位置，推荐写在head中先写title，再css，最后js
            一个页面可以有多个js文件，一个外部的js文件，可以为多个html文件引入
    
            ctrl+shift+j打开控制台
    -->

    <!-- JS的输出方式
        1、输出到控制台
            console.log();

        2、输出到网页
            document。write();
            注意：可以解析HTML标签
            语法："<开始标签></结束标签>"

        3、弹出警告框
            alert();
            注意：会阻止页面程序的执行。
    -->

    <!-- JS调试
        报错包含的内容
            1、错误类型
            2、错误原因
            3、错误位置 
    
        多个script报错
            其中一个script报错，对其他script没有影响
            同一个script中，错误及错误后面不显示
    -->     

    <!-- JS的语法
        1、JS区分大小写
        2、JS语句以分号结尾或者以换行结尾
        3、建议一行只写一条语句，并且以分号结尾
        4、JS忽略多余的空格 
    -->

    <!-- JS的注释
        1、HTML的注释
        《!-- 注释的内容 --》

        2、CSS的注释
        /* 注释的内容 */

        3、JS的注释
        单行注释：//注释的内容
        多行注释：/* 注释的内容 */

        快捷键：单行注释ctrl+/
               多行注释ctrl+shift+/
    -->

    <!-- 变量
        定义：值可以改变的量成为变量
        例如：x y a

        作用：存储数据的容器

        声明变量
            var 变量名;

        变量赋值
            变量名 = 值;
            等号右边的值赋给左边的变量
            变量名不加引号
            加引号直接输出引号之间的内容，单双引号都可以

        变量的初始化
            声明变量的同时赋值，成为变量的初始化
            var 变量名 = 值;

        声明变量没有赋值
            var 变量名   输出undefined

        没有声明和赋值，直接输出变量
            直接输出变量console.log(x);  报错 ReferenceError(找不到对象)

        重新声明
            var x = 10;
            var x;
            重新声明变量，前面的值不会丢失

        重新赋值
            var x = 10;
            x = 100;
            后面的值会替换前面的值

        声明提升
            JS中变量的声明会提升到所有代码的最上面(作用域)，赋值留在原地
            console.log(x); undefined
            var x = 10;
            console.log(x); 100

            相当于
            var x;声明提升到所有代码(作用域)最上面
            console.log(x); undefined
            var x = 10;赋值留在原地
            console.log(x); 100

        不写var的情况
            不写var声明的变量作用域不受控制

        一条语句可以声明多个变量，用逗号","隔开
            var x,y,z

        变量的命名规则
            1、区分大小写 a A为两个变量

            2、可以包含数字、字母、下划线、$

            3、不能以数字开头

            4、不能是JS的关键字和保留字
                var undefined等
            
            5、建议驼峰命名法，第一个单词的首字母小写，后面单词的首字母大写
                userName

            6、建议起见名知意变量名
                age name等
    -->

    <!-- 数据类型
        JS中有六大数据类型，分为基本类型及引用类型
        基本类型：
            number、string、boolean(true|false)、undefined(未定义类型)、null(空类型)
        引用类型：
            object
    
        number数字类型
        包含所有的数组(整数、小数、正数、负数、极大极小数、NaN[not a number]、Infinity、-Infunity)
         
        string字符串类型
        引号包含的任意内容，单双引号都可以，成对出现。

        boolean布尔类型
        true和false

        undefined未定义类型
        声明变量没有赋值，默认值为undefined，数据类型为undefined
        undefined一般不会主动去赋值
        undefined表示数据类型不确定

        null空类型
        null是一个空对象指针，表示准备用来保存对象，还没有真正保存对象的值，如果定义的变量准备在将来用于保存对象，应该将该变量初始化为null，所以null值用typeof检测出来是object

        object对象类型
        {key:value}
        多个键值对用逗号隔开，最后一个键值对后面不加逗号，键值对由属性和属性值组成，属性和属性值之间用冒号分割

        JS拥有动态的数据类型，所以JS为弱类型语言
        例如：var x; undefined
             x = 10; number
             x = '10' string

        判断数据类型
        typeof：number|string|boolean|undefined|object
    -->

    <!-- 变量类型的转换
        1、string转换为number
            parseInt(值) 转换为整数
                只取整数部分，没有四舍五入
                整数前面的0.直接忽略
                如果不能转换为数字，则返回NaN

            parseFloat(值) 转换为小数(浮点数)
                只能识别一个小数点，没有四舍五入
                整数前面得到0，直接忽略
                如果不能转换为数字，返回NaN
                如果是整数，不会自动补小数点
    -->

    <!-- 动态输入框
        语法：prompt("提示"，默认值)
        默认值可以省略
        返回string类型

        语法：
        var x = prompt("提示",number); number为默认提示，可省略
    -->
 
    <!-- 算数运算符
        + - * / % ++ -- 

        1、"+"运算符
            数学加法运算
            +运算符遇到字符串，直接进行字符串拼接，返回string类型

        2、"-"运算符
            数学减法运算
    
        3、"*"运算符
            数学乘法运算

        4、"/"运算符
            数学除法运算

        5、"%"运算符
            数学取余(模)运算

        注意：-、*、/、%：遇到非number类型时，先转换为number类型进行计算，如果不能转换，则返回NaN，数据类型为number类型(隐式转换)
            当能整除时，余数为0
    
        6、"++"运算符
            自增运算，相当于自己加1
            i++相当于i = i + 1
            ++i相当于i = i + 1

        7、"--"运算符
            自减运算，相当于自己减1
            i--相当于i = i - 1 
            --i相当于i = i - 1

        注意：不管前++|--，还是后++|--，对于变量自己本身来说没有区别，++或者--以后值都要改变
             对于其他变量来说，前++|--是先运算后赋值，后++|--是先赋值，后运算(y = x++|++x|x--|--x)
    -->

    <!--比较运算符
        比较运算符的返回值为布尔值
        > < >= <= == === != !==
        >= (判断大于或者等于)
        <= (判断小于或者等于)
        == (等于 只判断数值)
        === (绝对等于 及判断数值，又判断数据类型)
        != (不等于 ==的取反)
        !== (不绝对等于 ===的取反)
        注意：字符串比较是一个字符一个字符去比较，一旦决定大小，就不再往下比较
             undefined == null (true,值相等都为空)
             undefined === null (false，值相等，但是数据类型不同,null的数据类型为object)
             NaN == NaN (false，因为NaN可以为字符串，字符串可任意设定)
             NaN != NaN (true,上面的取反)
    -->

    <!-- 逻辑运算符
        用于测定变量之间的逻辑，返回布尔值
        &&  ||  !
        && 与
        || 或
        !  非
        注意：同时计算时，&&的优先级高于||的优先级，所以优先计算
    -->

    <!-- 赋值运算符
        给变量赋值
        = +=  -= *= /= %=
        x += y 等同于 x = x + y
        x -= y 等同于 x = x - y
        x *= y 等同于 x = x * y
        x /= y 等同于 x = x / y
        x %= y 等同于 x = x % y
    -->

    <!-- 分支结构
        程序 = 数据 + 算法
        数据：变量
        算法：
        1、顺序结构
        2、分支结构 根据不同的条件，做出不同的选择器
        3、循环结构 重复执行相同的代码

        分支结构：
        1、单分支结构 if结构
            if(条件){满足条件执行的语句}
        2、双分支结构 if else结构
            if(条件){满足条件执行的语句}else{不满足条件执行的语句}
        3、多分枝结构 elseif 结构
            if(条件){满足当前条件执行的语句}
            else if(条件){满足当前条件执行的语句}
            else if(条件){满足当前条件执行的语句}
            else{以上条件都不满足执行的语句}
        注意：else可以省略
             由上往下判断条件，一旦条件满足，就不再往下走
             多件事情，多选一执行
         
        这几个分支结构可互相嵌套

        循环结构：
        组成部分：条件分支、循环语句。
        是一系列反复执行知道符合特定条件的命令。
        语法：
            for(语句1;语句2;语句3){执行的代码块}
            语句1：初始化循环变量
            语句2：循环条件
            语句3：执行规律

        原理：先判断循环变量是否满足循环条件，如果不满足直接退出循环
             如果条件满足，直接进入到循环内部
             执行循环规律，让循环变量发生改变
             判断循环变量改变后是否满足循环条件
             如果条件满足再直接进入到循环内部
             执行循环规律，再让循环变量发生改变
             判断改变后的循环变量是否满足循环条件，如果不满足，直接跳出循环

        输出：输出写在for循环中，输出整个过程
             输出写在for循环外，输出最终结果

        变量
            如果变量初始化一个值，以后的变量值都需要变化，那么在循环外声明变量
            如果每次进入循环，变量的值都不改变，那么在循环内部声明变量

        for循环嵌套
        语句：for(语句1；语句2；语句3){
                for(语句1；语句2；语句3){
                    被执行的代码块           
                }
            }

        原理：外层循环走一下，内层循环走一圈
            外层循环遍历行，内层循环遍历列
            外层循环控制内层循环执行的次数，内层循环控制实际输出
    -->
    

    

</body>
</html>
