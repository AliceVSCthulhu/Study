<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #042104;
            animation: bg 10s linear infinite;
        }

        .load{
            position: relative;
            width: 120px;
            height: 120px;
        }

        .load span{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            rotate: calc(var(--i) * 30deg);
        }

        .load span::before{
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            background-color: #00ff0a;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff0a,
                        0 0 20px #00ff0a,
                        0 0 40px #00ff0a,
                        0 0 80px #00ff0a,
                        0 0 100px #00ff0a;
            animation: rotate 2s linear infinite;
            animation-delay: calc(var(--i) * 0.17s);
        }

        @keyframes bg{
            from{
                filter:hue-rotate(0deg)
            }
            to{
                filter:hue-rotate(360deg)
            }
        }

        @keyframes rotate{
            0%{
                transform: scale(1);
            }
            80%,100%{
                transform: scale(0);
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="load">
            <span style="--i:1"></span>
            <span style="--i:2"></span>
            <span style="--i:3"></span>
            <span style="--i:4"></span>
            <span style="--i:5"></span>
            <span style="--i:6"></span>
            <span style="--i:7"></span>
            <span style="--i:8"></span>
            <span style="--i:9"></span>
            <span style="--i:10"></span>
            <span style="--i:11"></span>
            <span style="--i:12"></span>
        </div>
    </div>
</body>
</html>
